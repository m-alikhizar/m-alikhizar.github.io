    <div id="root">
        <canvas aria-hidden="true"></canvas>

    <script>
        (function() {
            'use strict';
            
            const canvas = document.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            const pixelRatio = window.devicePixelRatio || 1;
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            const amplitude = 90;
            let hue = 0;
            const TWO_PI = Math.PI * 2;
            const cos = Math.cos;
            const random = Math.random;
            
            let trail = [
                { x: 0, y: 0.7 * height + amplitude },
                { x: 0, y: 0.7 * height - amplitude }
            ];
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * pixelRatio;
                canvas.height = height * pixelRatio;
                ctx.scale(pixelRatio, pixelRatio);
                ctx.globalAlpha = 0.6;
            }
            
            function generateWavePoint(y) {
                const newY = y + (2 * random() - 1.1) * amplitude;
                if (newY > height || newY < 0) {
                    return generateWavePoint(y);
                }
                return newY;
            }
            
            function drawTriangle(p1, p2) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                
                const nextX = p2.x + (2 * random() - 0.25) * amplitude;
                const nextY = generateWavePoint(p2.y);
                
                ctx.lineTo(nextX, nextY);
                ctx.closePath();
                
                hue -= TWO_PI / 50;
                const color = (127 * cos(hue) + 128) << 16 | 
                             (127 * cos(hue + TWO_PI / 3) + 128) << 8 | 
                             (127 * cos(hue + TWO_PI * 2 / 3) + 128);
                
                ctx.fillStyle = '#' + color.toString(16);
                ctx.fill();
                
                trail[0] = trail[1];
                trail[1] = { x: nextX, y: nextY };
            }
            
            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                trail = [
                    { x: 0, y: 0.7 * height + amplitude },
                    { x: 0, y: 0.7 * height - amplitude }
                ];
                
                while (trail[1].x < width + amplitude) {
                    drawTriangle(trail[0], trail[1]);
                }
            }
            
            function init() {
                resizeCanvas();
                animate();
            }
            
            document.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            window.addEventListener('resize', resizeCanvas);
            document.addEventListener('click', animate);
            
            init();
        })();
    </script>
